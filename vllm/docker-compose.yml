services:
  vllm:
    image: vllm/vllm-openai:cu130-nightly
    container_name: stacksmith_vllm
    restart: unless-stopped
    entrypoint:
      - /usr/bin/env
      - python3
      - -c
      - |
        import os, shlex, subprocess, sys
        model = os.environ.get("STACKSMITH_MODEL", "")
        if not model:
            print("STACKSMITH_MODEL must be set", file=sys.stderr)
            raise SystemExit(1)

        prelaunch = os.environ.get("STACKSMITH_PRELAUNCH_PIP_PACKAGES", "").strip()
        if prelaunch:
            env = dict(os.environ)
            env["PIP_ROOT_USER_ACTION"] = "ignore"
            subprocess.run(
                [sys.executable, "-m", "pip", "install", "-q", *shlex.split(prelaunch)],
                check=True,
                env=env,
            )

        args = [
            "vllm",
            "serve",
            model,
            "--host", "0.0.0.0",
            "--port", "8000",
            "--gpu-memory-utilization", os.environ.get("STACKSMITH_GPU_MEMORY_UTILIZATION", "0.70"),
            "--max-model-len", os.environ.get("STACKSMITH_MAX_MODEL_LEN", "8192"),
        ]

        served_model_name = os.environ.get("STACKSMITH_SERVED_MODEL_NAME", "").strip()
        if served_model_name:
            args += ["--served-model-name", served_model_name]

        quantization = os.environ.get("STACKSMITH_QUANTIZATION", "").strip()
        if quantization:
            args += ["--quantization", quantization]

        api_key = os.environ.get("STACKSMITH_API_KEY", "").strip()
        if api_key:
            args += ["--api-key", api_key]

        extra_args = os.environ.get("STACKSMITH_EXTRA_ARGS", "").strip()
        if extra_args:
            args += shlex.split(extra_args)

        os.execvp("vllm", args)
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      STACKSMITH_MODEL: ${STACKSMITH_MODEL}
      STACKSMITH_SERVED_MODEL_NAME: ${STACKSMITH_SERVED_MODEL_NAME:-}
      STACKSMITH_QUANTIZATION: ${STACKSMITH_QUANTIZATION:-}
      STACKSMITH_GPU_MEMORY_UTILIZATION: ${STACKSMITH_GPU_MEMORY_UTILIZATION:-0.70}
      STACKSMITH_MAX_MODEL_LEN: ${STACKSMITH_MAX_MODEL_LEN:-8192}
      STACKSMITH_API_KEY: ${STACKSMITH_API_KEY:-}
      STACKSMITH_EXTRA_ARGS: ${STACKSMITH_EXTRA_ARGS:-}
      STACKSMITH_PRELAUNCH_PIP_PACKAGES: ${STACKSMITH_PRELAUNCH_PIP_PACKAGES:-pandas}
    volumes:
      - vllm-hf-cache:/root/.cache/huggingface
    ipc: host
    gpus: all
    ports:
      - 127.0.0.1:${VLLM_HOST_PORT:-8000}:8000
    networks:
      - stacksmith

volumes:
  vllm-hf-cache:
    name: stacksmith_vllm_hf_cache

networks:
  stacksmith:
    external: true
