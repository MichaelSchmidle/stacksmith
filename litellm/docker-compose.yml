services:
  litellm-db:
    image: postgres:16-alpine
    container_name: stacksmith_litellm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LITELLM_DB_NAME:-litellm}
      POSTGRES_USER: ${LITELLM_DB_USER:-litellm}
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    networks:
      - stacksmith

  litellm:
    image: docker.litellm.ai/berriai/litellm-database:main-latest
    container_name: stacksmith_litellm
    restart: unless-stopped
    depends_on:
      - litellm-db
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://${LITELLM_DB_USER:-litellm}:${LITELLM_DB_PASSWORD}@litellm-db:5432/${LITELLM_DB_NAME:-litellm}
    command:
      - /bin/sh
      - -lc
      - |
        cat >/tmp/litellm-config.yaml <<'EOF'
        model_list: []

        general_settings:
          store_model_in_db: true
        EOF
        exec litellm --config /tmp/litellm-config.yaml --port 4000 --host 0.0.0.0
    networks:
      - stacksmith
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.litellm.rule=Host(`${LITELLM_HOSTNAME}`)"
      - "traefik.http.routers.litellm.entrypoints=websecure-tailscale"
      - "traefik.http.routers.litellm.tls.certresolver=stacksmith"
      - "traefik.http.services.litellm.loadbalancer.server.port=4000"
      - "traefik.http.routers.litellm.middlewares=secure-headers@docker"

volumes:
  litellm-db-data:
    name: stacksmith_litellm_db_data

networks:
  stacksmith:
    external: true
